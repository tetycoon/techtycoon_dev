  <script type="text/javascript">
    // Single Page Apps for GitHub Pages
    // https://github.com/rafgraph/spa-github-pages
    // This script checks to see if a redirect is present in the query string
    // and converts it back into the correct url and adds it to the
    // browser's history using window.history.replaceState(...),
    // which un-does the redirect made by the 404.html page
    (function (l) {
      if (l.search) {
        var q = {};
        l.search.slice(1).split('&').forEach(function (v) {
          var a = v.split('=');
          q[a[0]] = a.slice(1).join('=').replace(/~and~/g, '&');
        });
        if (q.p !== undefined) {
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + (q.p || '') +
            (q.q ? ('?' + q.q) : '') +
            l.hash
          );
        }
      }
    }(window.location))
  </script>

  <script>
    async function submitAndPay() {

      // ==============================
      // 1️⃣ GET FORM VALUES
      // ==============================
      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();
      const phone = document.getElementById("phone").value.trim();
      const batch = document.getElementById("batch").value;

      if (!name || !email || !phone) {
        alert("Please fill all required fields");
        return;
      }

      // ==============================
      // 2️⃣ DETECT PAGE URL (CATEGORY)
      // ==============================
      const pageUrl = window.location.href;

      // ==============================
      // 3️⃣ CALL APPS SCRIPT
      // → Creates Razorpay order
      // → Saves INITIATED row
      // ==============================
      let result;
      try {
        const response = await fetch("https://script.google.com/macros/s/AKfycbw59X8thSpB9xrJSI0GhACEm617vAbc7BDH6hJFOOBsOeq-B4az0p3B_O6koMjYfsppgA/exec", {
          method: "POST",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify({
            userType: "school students",
            pageUrl,
            name,
            email,
            phone,
            batch
          })
        });

        result = await response.json();

        if (!result.success || !result.orderId) {
          alert("Failed to create payment order. Please try again.");
          return;
        }

      } catch (err) {
        alert("Server error. Please try again later.");
        console.error(err);
        return;
      }

      // ==============================
      // 4️⃣ OPEN RAZORPAY CHECKOUT
      // ==============================
      const options = {
        key: "rzp_live_gfoS1OjC8tvWjP", // ✅ LIVE KEY ID ONLY
        order_id: result.orderId,      // 🔥 RESTORED to allow tracking
        amount: 999900,                // ₹9,999 in paise
        currency: "INR",
        name: "AI Summer Bootcamp 2026",
        description: "Bootcamp Enrollment",

        handler: function (response) {
          // ⚠️ DO NOT update sheet here
          // ⚠️ DO NOT send email here
          // Webhook will handle everything
          alert("Payment successful! You will receive a confirmation email shortly.");
        },

        prefill: {
          name: name,
          email: email,
          contact: phone
        },

        theme: {
          color: "#6C63FF"
        }
      };

      const rzp = new Razorpay(options);
      rzp.open();
    }
  </script>
